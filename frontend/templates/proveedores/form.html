{% extends 'base/base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ titulo }}{% endblock %}
{% block page_title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card border-0 shadow-sm" style="border-radius:12px;">
      <div class="card-header bg-white border-0 pt-3">
        <h6 class="fw-semibold mb-0"><i class="bi bi-truck me-2 text-secondary"></i>{{ titulo }}</h6>
      </div>
      <div class="card-body">
        <form method="post" novalidate>{% csrf_token %}{% crispy form %}</form>
      </div>
      <div class="card-footer bg-white border-0">
        <a href="{% url 'proveedores:lista' %}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Volver</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
